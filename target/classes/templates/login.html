<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Cho Thuê Xe</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-form { border: 1px solid #ddd; padding: 40px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        nav { position: absolute; top: 20px; right: 20px; }
        nav a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Trang Chủ</a>
    </nav>
    <div class="login-form">
        <h2>Đăng Nhập</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng Nhập</button>
        </form>
        <p>Chưa có tài khoản? <a href="/register">Đăng ký</a></p>
    </div>
</body>
</html>
